version: 2

before:
  hooks:
    - go mod tidy

builds:
  - main: ./cmd/arc
    binary: arc
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - windows
      - darwin
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: windows
        goarch: arm64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [binary]

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

brews:
  - repository:
      owner: fogfish
      name: arcnet-cli
    homepage: https://github.com/fogfish/arcnet-cli
    description: CLI for Knowledge Graph
    test: |
      system "#{bin}/arc --version"
